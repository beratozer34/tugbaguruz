<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKS Gurur Tablomuz</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0e12;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        .header-title {
            font-size: 36px;
            font-weight: 800;
            color: #ffd700; /* Altın Sarısı */
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            margin-bottom: 50px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .gallery-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
        }
        .card {
            background-color: #1a1c23;
            border: 2px solid #2d313f;
            border-radius: 16px;
            padding: 20px;
            width: 300px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.15);
        }
        .photo-wrapper {
            width: 100%;
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #252936;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .friend-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .card:hover .friend-photo {
            transform: scale(1.05);
        }
        .click-hint {
            font-size: 14px;
            color: #8a92a6;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Büyük Pop-up Overlay / Modal */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 6, 8, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background-color: #1a1c23;
            border: 3px solid #ffd700;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.2);
            position: relative;
        }
        .overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-photo-wrapper {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .modal-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .troll-text {
            font-size: 32px;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            background-color: #ff4757;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .close-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1 class="header-title">YKS GURUR TABLOMUZ</h1>

    <div class="gallery-container">
        <div class="card" onclick="trollAç('sol.jpg', 'İBNOŞŞŞŞ')">
            <div class="photo-wrapper">
                <img src="sol.jpg" alt="Gurur Tablosu" class="friend-photo">
            </div>
            <div class="click-hint">Tıkla ve İncele</div>
        </div>

        <div class="card" onclick="trollAç('orta.jpg', 'MİKRO UYUZ')">
            <div class="photo-wrapper">
                <img src="orta.jpg" alt="Gurur Tablosu" class="friend-photo">
            </div>
            <div class="click-hint">Tıkla ve İncele</div>
        </div>

        <div class="card" onclick="trollAç('sag.jpg', 'TÜRKAN ŞORAY GÖZLÜ')">
            <div class="photo-wrapper">
                <img src="sag.jpg" alt="Gurur Tablosu" class="friend-photo">
            </div>
            <div class="click-hint">Tıkla ve İncele</div>
        </div>
    </div>

    <div class="overlay" id="trollOverlay" onclick="trollKapat(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('trollOverlay').classList.remove('active')">×</button>
            <div class="modal-photo-wrapper">
                <img src="" id="modalImg" class="modal-photo" alt="Troll">
            </div>
            <div id="modalText" class="troll-text"></div>
        </div>
    </div>

    <script>
        function trollAç(fotoYolu, metin) {
            // Modal içindeki resmi ve metni dinamik olarak değiştiriyoruz
            document.getElementById('modalImg').src = fotoYolu;
            document.getElementById('modalText').innerText = metin;
            
            // Pop-up ekranını görünür yapıyoruz
            document.getElementById('trollOverlay').classList.add('active');
        }

        function trollKapat(event) {
            // Eğer modalın dışındaki siyah alana tıklanırsa kapat
            if (event.target.id === 'trollOverlay') {
                document.getElementById('trollOverlay').classList.remove('active');
            }
        }
    </script>

</body>
</html>
